<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>査定依頼 管理画面</title><link rel="stylesheet" href="style.css"><style>body{background:#f3f6fa}.admin{max-width:1200px;margin:40px auto;padding:0 20px}.admin h1{color:var(--navy)}.notice{background:#fff3cd;padding:12px;border-radius:8px;font-size:13px}.table{overflow:auto;background:#fff;border-radius:12px;box-shadow:0 5px 20px #183b5e12;margin-top:20px}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{text-align:left;padding:13px;border-bottom:1px solid #e7edf4;font-size:12px}th{background:#eaf3ff;color:#183550}td b{color:var(--blue)}.empty{text-align:center;padding:50px}</style></head><body><div class="admin"><h1>不動産査定 受付管理</h1><p class="notice">⚠ 公開前に、このページへログイン認証を追加してください。現在はローカル確認用です。</p><div id="count"></div><div class="table"><table><thead><tr><th>受付日時</th><th>受付番号</th><th>物件</th><th>所在地</th><th>面積</th><th>希望時期</th><th>お名前</th><th>電話</th><th>メール</th></tr></thead><tbody id="rows"></tbody></table></div></div><script>fetch('/api/assessments').then(r=>r.json()).then(a=>{count.textContent=`査定依頼：${a.length}件`;rows.innerHTML=a.length?a.map(x=>`<tr><td>${new Date(x.createdAt).toLocaleString('ja-JP')}</td><td><b>${x.id}</b></td><td>${x.propertyType}</td><td>${x.prefecture}${x.city}${x.address}</td><td>土地 ${x.landArea||'-'} / 建物 ${x.buildingArea||'-'}</td><td>${x.timing||'-'}</td><td>${x.name}</td><td>${x.phone}</td><td>${x.email}</td></tr>`).join(''):'<tr><td colspan="9" class="empty">まだ査定依頼はありません</td></tr>'})</script></body></html>
